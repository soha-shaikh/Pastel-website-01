{% extends 'base.html' %}

{% block content %}
<div class="memory-wrapper">
    <div class="memory-header">
        <h2>Memory Game 🌸</h2>
        <p class="memory-sub">Match all the flower pairs!</p>
        <div class="memory-stats">
            <div class="stat-pill">
                <span class="stat-label">Moves</span>
                <span class="stat-val" id="moves">0</span>
            </div>
            <div class="stat-pill">
                <span class="stat-label">Pairs</span>
                <span class="stat-val" id="pairs">0 / 8</span>
            </div>
            <div class="stat-pill">
                <span class="stat-label">Time</span>
                <span class="stat-val" id="timer">0s</span>
            </div>
        </div>
    </div>

    <div class="memory-grid" id="memoryGrid"></div>

    <button class="restart-btn" id="restartBtn">New Game 🌷</button>
</div>

<!-- Win overlay -->
<div class="win-overlay" id="winOverlay">
    <div class="win-card">
        <div class="win-emoji">🌸</div>
        <h2>You bloomed!</h2>
        <p id="winStats">Completed in 0 moves and 0s</p>
        <button class="restart-btn" id="playAgainBtn">Play Again 🌺</button>
    </div>
</div>

<style>
.memory-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 40px;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
}

.memory-header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeInUp 0.6s ease 0.2s both;
}

.memory-header h2 {
    color: #cc7a9a;
    font-size: 2rem;
    margin: 0 0 4px;
}

.memory-sub {
    color: #aaa;
    margin: 0 0 16px;
    font-size: 0.95rem;
}

.memory-stats {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.stat-pill {
    background: rgba(255,255,255,0.85);
    border-radius: 50px;
    padding: 6px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 4px 12px rgba(255,180,198,0.15);
    min-width: 68px;
}

.stat-label {
    font-size: 11px;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.stat-val {
    font-size: 1.1rem;
    font-weight: 600;
    color: #cc7a9a;
}

/* Grid */
.memory-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 480px;
    animation: fadeInUp 0.6s ease 0.35s both;
}

/* Card */
.mem-card {
    aspect-ratio: 1;
    cursor: none;
    perspective: 600px;
    border-radius: 16px;
    position: relative;
}

.mem-card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 16px;
}

.mem-card.flipped .mem-card-inner,
.mem-card.matched .mem-card-inner {
    transform: rotateY(180deg);
}

.mem-front, .mem-back {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
}

.mem-front {
    background: linear-gradient(135deg, #ffd6e7, #e8d5f5);
    font-size: 1.6rem;
    box-shadow: 0 4px 14px rgba(255,180,198,0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.mem-front:hover {
    transform: scale(1.06);
    box-shadow: 0 8px 22px rgba(255,143,171,0.3);
}

.mem-front::after {
    content: '✿';
    color: rgba(255,255,255,0.55);
    font-size: 1.8rem;
}

.mem-back {
    background: white;
    font-size: 2rem;
    transform: rotateY(180deg);
    box-shadow: 0 4px 14px rgba(0,0,0,0.05);
}

/* Matched pulse */
.mem-card.matched .mem-back {
    animation: matchPulse 0.5s ease forwards;
}

@keyframes matchPulse {
    0%   { transform: rotateY(180deg) scale(1); }
    40%  { transform: rotateY(180deg) scale(1.15); }
    70%  { transform: rotateY(180deg) scale(0.95); }
    100% { transform: rotateY(180deg) scale(1); }
}

.mem-card.matched .mem-back {
    background: linear-gradient(135deg, #ffe4f0, #f0e4ff);
}

/* Shake on wrong */
.mem-card.wrong {
    animation: wrongShake 0.4s ease;
}

@keyframes wrongShake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-6px); }
    40%  { transform: translateX(6px); }
    60%  { transform: translateX(-4px); }
    80%  { transform: translateX(4px); }
    100% { transform: translateX(0); }
}

/* Restart button */
.restart-btn {
    background: linear-gradient(135deg, #ffb3c6, #ff8fab);
    border: none;
    padding: 12px 30px;
    border-radius: 50px;
    color: white;
    font-size: 1rem;
    font-family: inherit;
    font-weight: 600;
    cursor: none;
    margin-top: 24px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 18px rgba(255,143,171,0.3);
    animation: fadeInUp 0.6s ease 0.5s both;
}

.restart-btn:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 10px 24px rgba(255,143,171,0.4);
}

.restart-btn:active {
    transform: scale(0.97);
}

/* Win overlay */
.win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255, 220, 235, 0.6);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
}

.win-overlay.show {
    display: flex;
}

.win-card {
    background: white;
    border-radius: 28px;
    padding: 44px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(255, 143, 171, 0.25);
    animation: winPop 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes winPop {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
}

.win-emoji {
    font-size: 4rem;
    animation: winSpin 1s ease infinite alternate;
}

@keyframes winSpin {
    from { transform: rotate(-15deg) scale(1); }
    to   { transform: rotate(15deg) scale(1.2); }
}

.win-card h2 {
    color: #cc7a9a;
    font-size: 1.8rem;
    margin: 12px 0 6px;
}

.win-card p {
    color: #bbb;
    font-size: 0.95rem;
    margin: 0 0 20px;
}
</style>

<script>
const emojis = ['🌸','🌺','🌼','🌷','🌻','💐','🌹','🪷'];
let cards = [], flipped = [], matched = 0, moves = 0, timer = null, seconds = 0, lock = false;

function shuffle(arr) {
    return [...arr, ...arr]
        .map(v => ({ v, s: Math.random() }))
        .sort((a, b) => a.s - b.s)
        .map(o => o.v);
}

function startTimer() {
    clearInterval(timer);
    seconds = 0;
    timer = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = seconds + 's';
    }, 1000);
}

function stopTimer() { clearInterval(timer); }

function updateStats() {
    document.getElementById('moves').textContent = moves;
    document.getElementById('pairs').textContent = matched + ' / 8';
}

function buildGrid() {
    const grid = document.getElementById('memoryGrid');
    grid.innerHTML = '';
    cards = [];
    flipped = [];
    matched = 0; moves = 0; lock = false;
    updateStats();
    document.getElementById('timer').textContent = '0s';
    startTimer();

    const deck = shuffle(emojis);
    deck.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'mem-card';
        card.dataset.emoji = emoji;
        card.innerHTML = `
            <div class="mem-card-inner">
                <div class="mem-front"></div>
                <div class="mem-back">${emoji}</div>
            </div>`;
        card.addEventListener('click', () => flipCard(card));
        grid.appendChild(card);
        cards.push(card);

        // stagger entrance
        card.style.opacity = '0';
        card.style.transform = 'scale(0.7)';
        setTimeout(() => {
            card.style.transition = 'opacity 0.35s ease, transform 0.35s cubic-bezier(0.22,1,0.36,1)';
            card.style.opacity = '1';
            card.style.transform = 'scale(1)';
        }, i * 40 + 100);
    });
}

function flipCard(card) {
    if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
        lock = true;
        moves++;
        updateStats();
        const [a, b] = flipped;

        if (a.dataset.emoji === b.dataset.emoji) {
            // Match!
            setTimeout(() => {
                a.classList.add('matched');
                b.classList.add('matched');
                a.classList.remove('flipped');
                b.classList.remove('flipped');
                matched++;
                updateStats();
                flipped = [];
                lock = false;
                if (matched === 8) {
                    stopTimer();
                    setTimeout(showWin, 600);
                }
            }, 400);
        } else {
            // No match
            setTimeout(() => {
                a.classList.add('wrong');
                b.classList.add('wrong');
            }, 200);
            setTimeout(() => {
                a.classList.remove('flipped', 'wrong');
                b.classList.remove('flipped', 'wrong');
                flipped = [];
                lock = false;
            }, 900);
        }
    }
}

function showWin() {
    document.getElementById('winStats').textContent =
        `Completed in ${moves} move${moves !== 1 ? 's' : ''} and ${seconds}s`;
    document.getElementById('winOverlay').classList.add('show');
}

document.getElementById('restartBtn').addEventListener('click', () => {
    document.getElementById('winOverlay').classList.remove('show');
    buildGrid();
});

document.getElementById('playAgainBtn').addEventListener('click', () => {
    document.getElementById('winOverlay').classList.remove('show');
    buildGrid();
});

buildGrid();
</script>
{% endblock %}
